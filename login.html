<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Skills - Rahul Kumar</title>
    <link rel="stylesheet" href="styles.css">
<style>

body {
    margin: 0;
    padding: 0;
    background-color: #f2f2f2;
    font-family: Arial;
    text-align: center;
     background-image: url("https://www.baltana.com/files/wallpapers-33/Lord-of-The-Rings-Dark-Best-Wallpaper-112391.jpg");
}

/* LOGIN BOX */
.login-box {
    width: 300px;
    background:rgba(0,0,0,0.6);
    padding: 25px;
    border-radius: 15px;
    margin: 120px auto 10px auto;
    box-shadow: 0 0 12px rgba(0,0,0,0.2);
}

.login-box h2 {
    margin-bottom: 20px;
}

.field {
    text-align: left;
    margin-bottom: 15px;
}

.field label {
    display: block;
    margin-bottom: 5px;
    font-size: 14px;
    color: black;
}

.field input {
    width: 92%;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid gray;
    font-size: 14px;
}

.login-btn {
    width: 100%;
    padding: 10px;
    border: none;
    border-radius: 6px;
    background: black;
    color: white;
    font-size: 15px;
    cursor: pointer;
}

.back-btn {
    display: block;
    width: 160px;
    margin: 20px auto;
    padding: 10px;
    background: white;
    color: black;
    text-decoration: none;
    border-radius: 6px;
    border: 1px solid gray;
}

</style>
</head>

<body>
<nav>
        <a href="index.html" target="_blank">Home</a>
        <a href="about.html" target="_blank">About</a>
        <a href="skills.html" target="_blank">Skills</a>
        <a href="contact.html" target="_blank">Contact</a>
        <a href="login.html" target="_blank">Login</a>
    </nav>


<div class="login-box">
    <h2>Login</h2>

    <div class="field">
        <label><h3 style="color:red;">Username</h3></label>
        <input type="text">
    </div>

    <div class="field">
        <label><h3 style="color:red;">Password</h3></label>
        <input type="password">
    </div>

    <button class="login-btn">Login</button>
</div>

<a href="index.html" class="back-btn">Back to main page</a>

</body>
</html>
